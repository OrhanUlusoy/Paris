<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Möhippa Paris 🗼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:   #C9A84C;
    --gold2:  #F0D060;
    --gold3:  #FFF5C0;
    --cream:  #F5EFE0;
    --bg:     #06061A;
    --border: rgba(201,168,76,0.3);
    --rose:   #E8A0B0;
    --green:  #6EE7B7;
    --muted:  rgba(245,239,224,0.4);
  }

  /* ── BACKGROUND ─────────────────────────────────────────── */
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    color: var(--cream);
    overflow-x: hidden;
    position: relative;
  }
  .bg-sky {
    position: fixed; inset: 0; z-index: 0;
    background:
      /* warm horizon city-light haze */
      radial-gradient(ellipse 110% 22% at 50% 104%, rgba(210,110,30,0.22) 0%, rgba(150,35,140,0.11) 45%, transparent 68%),
      /* magenta-violet nebula upper-right */
      radial-gradient(ellipse 52% 46% at 93% 18%, rgba(210,38,130,0.20) 0%, rgba(140,15,90,0.09) 52%, transparent 72%),
      /* deep indigo nebula left */
      radial-gradient(ellipse 62% 52% at 5% 58%, rgba(100,22,220,0.26) 0%, rgba(55,8,160,0.13) 52%, transparent 72%),
      /* teal aurora band upper-mid */
      radial-gradient(ellipse 95% 32% at 32% 24%, rgba(8,185,175,0.12) 0%, rgba(20,80,200,0.06) 55%, transparent 72%),
      /* gold moon-light glow — bigger & brighter now */
      radial-gradient(ellipse 55% 42% at 73% 8%, rgba(255,220,100,0.22) 0%, rgba(201,140,20,0.10) 45%, transparent 68%),
      radial-gradient(ellipse 28% 22% at 73% 6%, rgba(255,248,180,0.18) 0%, transparent 55%),
      /* indigo-midnight right-mid */
      radial-gradient(ellipse 48% 38% at 90% 62%, rgba(50,12,170,0.16) 0%, transparent 58%),
      /* soft rose bloom center-low */
      radial-gradient(ellipse 70% 28% at 55% 80%, rgba(180,40,100,0.10) 0%, transparent 65%),
      /* deep velvet base */
      linear-gradient(180deg, #000510 0%, #030820 10%, #06092A 26%, #070830 50%, #110530 72%, #1E0835 100%);
  }
  .bg-skyline {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1;
    pointer-events: none; height: 310px;
  }
  /* ── AURORA ─────────────────────────────────────────────── */
  .bg-aurora { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .aurora-1, .aurora-2, .aurora-3, .aurora-4 {
    position:absolute; border-radius:50%; filter:blur(58px);
  }
  .aurora-1 {
    width:95vw; height:50vh; top:1%; left:-12%;
    background:radial-gradient(ellipse, rgba(16,220,200,0.16) 0%, rgba(38,10,220,0.09) 48%, transparent 78%);
    animation:awave 26s ease-in-out infinite alternate;
  }
  .aurora-2 {
    width:82vw; height:46vh; top:4%; right:-12%;
    background:radial-gradient(ellipse, rgba(220,22,175,0.15) 0%, rgba(90,8,230,0.08) 50%, transparent 78%);
    animation:awave 34s ease-in-out infinite alternate-reverse;
  }
  .aurora-3 {
    width:110vw; height:30vh; top:22%; left:-2%;
    background:radial-gradient(ellipse, rgba(10,150,240,0.13) 0%, rgba(20,18,200,0.07) 50%, transparent 72%);
    animation:awave 21s ease-in-out infinite alternate; animation-delay:-11s;
  }
  .aurora-4 {
    width:65vw; height:38vh; top:10%; left:18%;
    background:radial-gradient(ellipse, rgba(200,55,245,0.13) 0%, rgba(70,12,210,0.07) 50%, transparent 76%);
    animation:awave 28s ease-in-out infinite alternate-reverse; animation-delay:-6s;
  }
  /* extra golden aurora near moon */
  .aurora-5 {
    width:45vw; height:28vh; top:2%; right:4%;
    background:radial-gradient(ellipse, rgba(220,170,50,0.10) 0%, rgba(180,80,10,0.05) 50%, transparent 72%);
    animation:awave 38s ease-in-out infinite alternate; animation-delay:-3s;
  }
  @keyframes awave {
    0%   { opacity:.28; transform:scale(1)    translateX(0)     translateY(0); }
    33%  { opacity:1.0;  transform:scale(1.10) translateX(2.8%)  translateY(-1.5%); }
    66%  { opacity:.52; transform:scale(.93)  translateX(-2.2%) translateY(1.3%); }
    100% { opacity:.25; transform:scale(1.06) translateX(1.8%)  translateY(.7%); }
  }
  /* ── MOON ───────────────────────────────────────────────── */
  .moon-wrap {
    position:fixed; z-index:2; pointer-events:none;
    top:7%; right:10%;
    animation:moondrift 48s ease-in-out infinite alternate;
  }
  /* outer atmospheric corona — big diffuse halo */
  .moon-corona {
    position:absolute;
    width:340px; height:340px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,
      rgba(255,240,160,0.10) 0%,
      rgba(220,180,60,0.07)  22%,
      rgba(180,120,20,0.04)  42%,
      rgba(140,80,10,0.02)   60%,
      transparent 75%);
    filter:blur(18px);
    animation:coronapulse 9s ease-in-out infinite alternate;
  }
  @keyframes coronapulse {
    from { opacity:.7; transform:translate(-50%,-50%) scale(.94); }
    to   { opacity:1;  transform:translate(-50%,-50%) scale(1.06); }
  }
  /* halo ring — optical ring visible around real full moons */
  .moon-halo {
    position:absolute;
    width:200px; height:200px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    border-radius:50%;
    border:1.5px solid rgba(255,235,140,0.22);
    box-shadow:
      0 0 0 8px  rgba(240,210,90,0.06),
      0 0 0 22px rgba(220,180,50,0.04),
      0 0 0 45px rgba(200,150,30,0.025);
    animation:halorotate 90s linear infinite;
  }
  @keyframes halorotate { to { transform:translate(-50%,-50%) rotate(360deg); } }
  /* moon disc itself */
  .moon {
    position:absolute;
    width:82px; height:82px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    border-radius:50%;
    background:
      /* crater shadows */
      radial-gradient(circle 9px at 62% 28%, rgba(160,110,20,.38) 0%, transparent 100%),
      radial-gradient(circle 6px at 30% 62%, rgba(180,130,30,.28) 0%, transparent 100%),
      radial-gradient(circle 4px at 54% 58%, rgba(140,100,15,.22) 0%, transparent 100%),
      /* main surface */
      radial-gradient(circle at 36% 32%, #FFFEF4 0%, #FFF4C0 18%, #FAE070 42%, #D4950A 68%, #7D4E00 88%, rgba(50,28,0,.5) 100%);
    box-shadow:
      0 0 28px  rgba(255,230,100,.65),
      0 0 70px  rgba(220,170,40,.35),
      0 0 130px rgba(180,120,20,.18),
      inset -6px -6px 18px rgba(80,40,0,.28);
  }
  /* subtle shimmer on moon surface */
  .moon::after {
    content:''; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(ellipse 55% 45% at 30% 28%, rgba(255,255,255,.22) 0%, transparent 62%);
  }
  @keyframes moondrift {
    from { transform:translateY(0); }
    to   { transform:translateY(-14px) translateX(4px); }
  }
  /* ── SPARKLES (fairy dust) ─────────────────────────────── */
  .sparkles { position:fixed; inset:0; z-index:1; pointer-events:none; }
  .sparkle {
    position:absolute; pointer-events:none;
    width:3px; height:3px; border-radius:50%;
    animation:sparkle-float linear infinite;
  }
  @keyframes sparkle-float {
    0%   { opacity:0;   transform:translateY(0)    scale(0) rotate(0deg); }
    8%   { opacity:.9;  transform:translateY(-12px) scale(1.4) rotate(40deg); }
    50%  { opacity:.55; transform:translateY(-55px) scale(0.9) rotate(140deg); }
    92%  { opacity:.15; transform:translateY(-110px) scale(0.5) rotate(260deg); }
    100% { opacity:0;   transform:translateY(-130px) scale(0); }
  }

  /* ── STARS ──────────────────────────────────────────────── */
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  /* larger cross/diamond stars */
  .star.big::before, .star.big::after {
    content:''; position:absolute; background:inherit; border-radius:1px;
  }
  .star.big::before { width:1px; height:280%; top:-90%; left:calc(50% - .5px); opacity:.5; }
  .star.big::after  { width:280%; height:1px; left:-90%; top:calc(50% - .5px); opacity:.5; }
  @keyframes twinkle {
    0%,100% { opacity: 0.08; transform: scale(1); }
    50%     { opacity: 1;    transform: scale(1.65); }
  }
  /* shooting star */
  .shooting-star {
    position:fixed; z-index:1; pointer-events:none;
    height:1.5px; border-radius:2px;
    background:linear-gradient(90deg,rgba(255,255,220,.95),rgba(255,255,220,.4),transparent);
    animation:shoot linear forwards;
  }
  @keyframes shoot {
    from { opacity:1; transform:translateX(0) translateY(0); }
    to   { opacity:0; transform:translateX(var(--sx)) translateY(var(--sy)); }
  }

  /* ── BUBBLES ────────────────────────────────────────────── */
  .bubbles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .bubble  { position: absolute; border-radius: 50%; opacity: 0; animation: rise linear infinite; }
  @keyframes rise {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    8%   { opacity: 0.6; }
    88%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── SCREENS ────────────────────────────────────────────── */
  .screen {
    display: none; position: relative; z-index: 10;
    min-height: 100dvh; padding: 28px 18px 36px;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .screen.active { display: flex; animation: screenIn .5s ease both; }
  #screen-vote.active, #screen-results.active { justify-content: flex-start; }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SHARED ─────────────────────────────────────────────── */
  .serif { font-family: 'Cormorant Garamond', serif; }
  .gold-text {
    background: linear-gradient(125deg, #8B6008 0%, var(--gold) 25%, var(--gold2) 50%, var(--gold3) 62%, var(--gold2) 75%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .divider       { width: 70px;  height: 1px; background: linear-gradient(90deg,transparent,var(--gold2),transparent); margin: 0 auto; }
  .divider-wide  { width: 160px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent); margin: 0 auto; }

  /* ── LOGIN ──────────────────────────────────────────────── */
  .login-wrap {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 440px;
    animation: fadeUp .8s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tower-wrap { position: relative; margin-bottom: 22px; }
  .tower-glow {
    position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 35px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.5) 0%, transparent 70%);
    filter: blur(8px);
    animation: glow-pulse 2.5s ease-in-out infinite alternate;
  }
  @keyframes glow-pulse {
    from { opacity:.5; transform:translateX(-50%) scaleX(.8); }
    to   { opacity:1;  transform:translateX(-50%) scaleX(1.2); }
  }

  .login-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 5px;
    color: var(--rose); text-transform: uppercase; margin-bottom: 10px;
    animation: fadeUp .7s .1s ease both;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(50px, 14vw, 76px);
    font-weight: 300; line-height: 1; text-align: center;
    letter-spacing: 6px;
    animation: fadeUp .7s .15s ease both;
  }
  .login-accent {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(14px, 4vw, 19px); font-weight: 300;
    color: rgba(245,239,224,.55); letter-spacing: 2px;
    margin: 8px 0 20px;
    animation: fadeUp .7s .2s ease both;
  }
  .login-card {
    width: 100%; max-width: 340px;
    background: rgba(10,10,30,0.72);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px 26px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.07), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp .7s .3s ease both;
    margin-top: 22px;
  }
  .login-label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 10px; text-align: center;
  }
  .name-input {
    width: 100%; padding: 15px 20px;
    border-radius: 14px; border: 1.5px solid rgba(201,168,76,0.2);
    background: rgba(255,255,255,0.04);
    color: var(--cream); font-family: 'Montserrat', sans-serif;
    font-size: 15px; outline: none; text-align: center;
    transition: border-color .3s, box-shadow .3s;
    margin-bottom: 14px; letter-spacing: 0.8px;
  }
  .name-input:focus { border-color: var(--gold2); box-shadow: 0 0 0 3px rgba(201,168,76,0.1), 0 0 24px rgba(201,168,76,0.08); }
  .name-input::placeholder { color: rgba(245,239,224,.28); }

  .btn-gold {
    width: 100%; padding: 16px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, #7A5500 0%, var(--gold) 30%, var(--gold2) 55%, var(--gold3) 65%, var(--gold2) 80%, var(--gold) 100%);
    color: #06061A; font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
    cursor: pointer; transition: transform .2s, box-shadow .2s, filter .2s;
    box-shadow: 0 6px 28px rgba(201,168,76,.35), inset 0 1px 0 rgba(255,255,255,.22);
    position: relative; overflow: hidden;
  }
  .btn-gold::before {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
    transition:left .5s;
  }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(201,168,76,.5); filter:brightness(1.06); }
  .btn-gold:hover::before { left:100%; }
  .btn-gold:active { transform:scale(.97); }
  .login-error { color:var(--rose); font-size:12px; margin-top:10px; min-height:16px; text-align:center; letter-spacing:.5px; }

  /* ── VOTE HEADER ─────────────────────────────────────────── */
  .vote-header {
    width:100%; max-width:480px;
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px; padding:0 2px;
  }
  .vote-user {
    font-size:12px; font-weight:700; letter-spacing:.5px;
    background:linear-gradient(90deg,var(--gold),var(--gold2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .vote-counter { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:1px; }

  .prog-track {
    width:100%; max-width:480px; height:2px;
    background:rgba(255,255,255,.06); border-radius:2px;
    overflow:visible; margin-bottom:16px; position:relative;
  }
  .prog-fill {
    height:100%;
    background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold3));
    border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); position:relative;
  }
  .prog-fill::after {
    content:''; position:absolute; right:-4px; top:-4px;
    width:10px; height:10px;
    background:var(--gold2); border-radius:50%;
    box-shadow:0 0 10px var(--gold2), 0 0 20px var(--gold);
  }

  /* ── CARD ───────────────────────────────────────────────── */
  .card {
    width:100%; max-width:480px;
    background:rgba(14,14,38,0.88);
    border:1px solid rgba(201,168,76,0.22);
    border-radius:32px; overflow:hidden; margin-bottom:16px;
    transition:transform .38s cubic-bezier(.4,0,.2,1), opacity .38s;
    box-shadow:0 24px 64px rgba(0,0,0,.58), 0 0 0 1px rgba(255,255,255,.03), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .card-img-wrap { position:relative; aspect-ratio:3/4; overflow:hidden; }
  .card-img {
    width:100%; height:100%; object-fit:cover; object-position:top center; display:block;
    transition:transform .6s ease;
  }
  .card:hover .card-img { transform:scale(1.025); }
  .card-img-wrap::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(6,6,26,.0) 38%,rgba(6,6,26,.55) 68%,rgba(6,6,26,.92) 100%);
    pointer-events:none;
  }
  .card-overlay {
    position:absolute; bottom:0; left:0; right:0;
    padding:18px 24px 20px; z-index:2;
  }
  .card-overlay-name {
    font-family:'Cormorant Garamond',serif;
    font-size:34px; font-weight:600; color:#fff; line-height:1;
    text-shadow:0 2px 14px rgba(0,0,0,.5); letter-spacing:1px;
  }
  .card-overlay-job {
    font-size:11px; font-weight:600; letter-spacing:2.5px;
    color:var(--gold2); text-transform:uppercase; margin-top:5px;
    text-shadow:0 1px 6px rgba(0,0,0,.4);
  }
  .card-body { padding:16px 20px 20px; }
  .tags { display:flex; flex-wrap:wrap; gap:8px; }
  .tag { padding:6px 14px; border-radius:20px; font-size:11px; font-weight:600; line-height:1.4; letter-spacing:.3px; }
  .tag-neutral { background:rgba(201,168,76,.1);   color:rgba(245,239,224,.75); border:1px solid rgba(201,168,76,.22); }
  .tag-green   { background:rgba(110,231,183,.09); color:var(--green);          border:1px solid rgba(110,231,183,.22); }
  .tag-red     { background:rgba(232,160,176,.09); color:var(--rose);           border:1px solid rgba(232,160,176,.22); }

  /* ── VOTE BUTTONS ───────────────────────────────────────── */
  .vote-btns { width:100%; max-width:480px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .btn-vote {
    padding:22px 10px; border-radius:22px; border:1.5px solid;
    cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;
    font-size:32px; transition:transform .15s, background .15s, box-shadow .15s;
    -webkit-tap-highlight-color:transparent; backdrop-filter:blur(8px);
  }
  .btn-vote span { font-family:'Montserrat',sans-serif; font-size:10px; font-weight:800; letter-spacing:4px; text-transform:uppercase; }
  .btn-pass  { background:rgba(232,160,176,.07); border-color:rgba(232,160,176,.32); color:var(--rose); }
  .btn-smash { background:rgba(110,231,183,.07); border-color:rgba(110,231,183,.32); color:var(--green); }
  .btn-pass:active  { background:rgba(232,160,176,.22); transform:scale(.95); box-shadow:0 0 30px rgba(232,160,176,.18); }
  .btn-smash:active { background:rgba(110,231,183,.22); transform:scale(.95); box-shadow:0 0 30px rgba(110,231,183,.22); }

  /* ── DONE ───────────────────────────────────────────────── */
  .done-wrap { text-align:center; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .done-icon {
    font-size:100px;
    animation:popIn .65s cubic-bezier(.35,1.6,.55,1) both;
    filter:drop-shadow(0 0 32px rgba(201,168,76,.7));
  }
  @keyframes popIn {
    from { transform:scale(0) rotate(-18deg); opacity:0; }
    to   { transform:scale(1) rotate(0);      opacity:1; }
  }
  .done-title { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,9vw,54px); font-weight:600; letter-spacing:2px; }
  .done-sub   { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; color:var(--muted); letter-spacing:1px; }
  .done-stars { font-size:26px; letter-spacing:10px; opacity:.55; animation:fadein 1s .5s ease both; }
  @keyframes fadein { from{opacity:0;} to{opacity:.55;} }

  /* ── RESULTS HEADER ─────────────────────────────────────── */
  .results-top { text-align:center; width:100%; margin-bottom:30px; }
  .results-eyebrow { font-size:10px; font-weight:700; letter-spacing:5px; color:var(--rose); text-transform:uppercase; margin-bottom:8px; }
  .results-title   { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,8vw,58px); font-weight:300; letter-spacing:4px; }
  .results-live    { font-size:10px; font-weight:700; letter-spacing:4px; color:var(--green); text-transform:uppercase; margin-top:6px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .live-dot        { width:7px; height:7px; background:var(--green); border-radius:50%; animation:blink 1.2s ease-in-out infinite; box-shadow:0 0 8px var(--green); }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.15;} }

  .btn-reset {
    margin-top:14px; padding:10px 28px; border-radius:50px;
    border:1px solid rgba(232,160,176,.35); background:rgba(232,160,176,.06);
    color:var(--rose); font-family:'Montserrat',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
    cursor:pointer; transition:background .2s,transform .15s;
  }
  .btn-reset:hover  { background:rgba(232,160,176,.16); }
  .btn-reset:active { transform:scale(.96); }

  /* ── RESULTS GRID ───────────────────────────────────────── */
  .results-grid {
    width:100%; max-width:1100px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:24px; padding-bottom:40px;
  }
  .r-card {
    background:rgba(12,12,32,.82); border:1px solid rgba(201,168,76,.2);
    border-radius:26px; overflow:hidden;
    box-shadow:0 8px 36px rgba(0,0,0,.45); backdrop-filter:blur(10px);
    transition:transform .2s,box-shadow .2s;
  }
  .r-card:hover { transform:translateY(-4px); box-shadow:0 18px 50px rgba(0,0,0,.55); }
  .r-img-wrap  { position:relative; aspect-ratio:3/4; overflow:hidden; }
  .r-img       { width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }
  .r-img-wrap::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 42%,rgba(6,6,26,.92) 100%); pointer-events:none; }
  .r-name-overlay { position:absolute; bottom:0; left:0; right:0; padding:18px 18px 14px; z-index:2; }
  .r-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:#fff; letter-spacing:.5px; text-shadow:0 1px 8px rgba(0,0,0,.4); }
  .r-body { padding:16px 18px 18px; }
  .r-bar-label { display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px; font-weight:600; letter-spacing:.5px; }
  .r-bar-track { background:rgba(255,255,255,.07); border-radius:8px; height:8px; overflow:hidden; margin-bottom:12px; }
  .r-bar-smash { height:100%; background:linear-gradient(90deg,#059669,#6EE7B7); border-radius:8px; transition:width .7s cubic-bezier(.4,0,.2,1); }
  .r-bar-pass  { height:100%; background:linear-gradient(90deg,#9D174D,var(--rose)); border-radius:8px; transition:width .7s cubic-bezier(.4,0,.2,1); }
  .r-total     { font-size:11px; color:var(--muted); text-align:center; margin-top:4px; letter-spacing:.5px; }
  .r-verdict   { margin-top:12px; text-align:center; }
  .verdict-badge { display:inline-block; padding:6px 18px; border-radius:20px; font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; }
  .v-smash { background:rgba(110,231,183,.15); color:var(--green); border:1px solid rgba(110,231,183,.3); }
  .v-pass  { background:rgba(232,160,176,.15); color:var(--rose);  border:1px solid rgba(232,160,176,.3); }
  .v-tie   { background:rgba(240,208,96,.12);  color:var(--gold2); border:1px solid rgba(240,208,96,.3); }
  .voters-list { font-size:10px; color:var(--muted); margin-top:10px; line-height:2; letter-spacing:.3px; }

  /* ── CONFETTI ───────────────────────────────────────────── */
  .confetti-piece {
    position:fixed; border-radius:2px; pointer-events:none; z-index:999;
    animation:confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
    100% { transform:translate(var(--tx),var(--ty)) rotate(var(--r)) scale(.25); opacity:0; }
  }
  </style>
</head>

  { id:"taha",    image:"Bilder/IMG_1112.png", name:"Taha",     age:27, job:"Biståndshandläggare",                interests:"Resa",                       greenFlags:"Ger bra råd & ställer upp",                           redFlags:"Hör aldrig av sig, dömande" }
];

let currentUser = "", currentIndex = 0;

// Routing
if (new URLSearchParams(window.location.search).has("results")) {
  showScreen("results"); initResults();
}

function showScreen(n) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + n).classList.add("active");
}
function safeKey(s){ return s.replace(/[.#$[\]/]/g,"_"); }

// Login
document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") startVoting(); });
function startVoting(){
  const name = document.getElementById("nameInput").value.trim();
  const err  = document.getElementById("login-error");
  if(!name){ err.textContent="Skriv in ditt namn för att fortsätta"; document.getElementById("nameInput").focus(); return; }
  err.textContent="";
  currentUser=name; currentIndex=0;
  document.getElementById("vote-user-label").textContent="✦ "+name;
  showScreen("vote"); renderCard();
}

// Render card
function renderCard(){
  const p=people[currentIndex];
  document.getElementById("card-img").src           = p.image;
  document.getElementById("card-img").alt           = p.name;
  document.getElementById("card-name").textContent  = `${p.name}, ${p.age}`;
  document.getElementById("card-meta").textContent  = p.job;
  document.getElementById("vote-count-label").textContent = `${currentIndex+1} / ${people.length}`;
  document.getElementById("prog-fill").style.width  = `${((currentIndex+1)/people.length)*100}%`;

  const te=document.getElementById("card-tags"); te.innerHTML="";
  const tag=(txt,cls)=>{ const t=document.createElement("span"); t.className=`tag ${cls}`; t.textContent=txt; te.appendChild(t); };
  if(p.interests)  tag("🎯 "+p.interests,  "tag-neutral");
  if(p.greenFlags) tag("✅ "+p.greenFlags, "tag-green");
  if(p.redFlags)   tag("🚩 "+p.redFlags,   "tag-red");
}

// Cast vote
function castVote(choice){
  document.querySelectorAll(".btn-vote").forEach(b=>b.disabled=true);
  const p=people[currentIndex];
  db.ref(`votes/${p.id}/voters/${safeKey(currentUser)}`).set(choice).catch(()=>{});
  if(choice==="smash") spawnConfetti();

  const card=document.getElementById("vote-card");
  card.style.transform = choice==="smash" ? "translateX(95px) rotate(10deg) scale(.9)" : "translateX(-95px) rotate(-10deg) scale(.9)";
  card.style.opacity="0";

  setTimeout(()=>{
    card.style.transition="none"; card.style.transform=""; card.style.opacity="1";
    requestAnimationFrame(()=>{
      card.style.transition="";
      document.querySelectorAll(".btn-vote").forEach(b=>b.disabled=false);
    });
    currentIndex++;
    if(currentIndex>=people.length){ showScreen("done"); spawnFinale(); }
    else renderCard();
  },380);
}

// Results
function initResults(){
  const grid=document.getElementById("results-grid"); grid.innerHTML="";
  people.forEach(p=>{
    const c=document.createElement("div"); c.className="r-card";
    c.innerHTML=`
      <div class="r-img-wrap">
        <img class="r-img" src="${p.image}" alt="${p.name}" loading="lazy"/>
        <div class="r-name-overlay"><div class="r-name">${p.name}, ${p.age}</div></div>
      </div>
      <div class="r-body">
        <div class="r-bar-label"><span style="color:var(--green)">♥ Smash</span><strong id="sc-${p.id}" style="color:var(--green)">0</strong></div>
        <div class="r-bar-track"><div class="r-bar-smash" id="sb-${p.id}" style="width:0%"></div></div>
        <div class="r-bar-label"><span style="color:var(--rose)">✕ Pass</span><strong id="pc-${p.id}" style="color:var(--rose)">0</strong></div>
        <div class="r-bar-track"><div class="r-bar-pass" id="pb-${p.id}" style="width:0%"></div></div>
        <div class="r-total" id="tot-${p.id}">0 röster</div>
        <div class="r-verdict" id="vrd-${p.id}"></div>
        <div class="voters-list" id="vlist-${p.id}"></div>
      </div>`;
    grid.appendChild(c);

    db.ref(`votes/${p.id}/voters`).on("value",snap=>{
      let smash=0,pass=0; const lines=[]; const data=snap.val();
      if(data) Object.entries(data).forEach(([nm,v])=>{
        const d=nm.replace(/_/g," ");
        if(v==="smash"){smash++;lines.push(`♥ ${d}`);}else{pass++;lines.push(`✕ ${d}`);}
      });
      const tot=smash+pass, sp=tot>0?(smash/tot)*100:0, pp=tot>0?(pass/tot)*100:0;
      document.getElementById(`sc-${p.id}`).textContent=smash;
      document.getElementById(`pc-${p.id}`).textContent=pass;
      document.getElementById(`sb-${p.id}`).style.width=sp+"%";
      document.getElementById(`pb-${p.id}`).style.width=pp+"%";
      document.getElementById(`tot-${p.id}`).textContent=`${tot} röst${tot!==1?"er":""}`;
      let badge="";
      if(tot>0){
        if(smash>pass)      badge=`<span class="verdict-badge v-smash">♥ Smash</span>`;
        else if(pass>smash) badge=`<span class="verdict-badge v-pass">✕ Pass</span>`;
        else                badge=`<span class="verdict-badge v-tie">✦ Oavgjort</span>`;
      }
      document.getElementById(`vrd-${p.id}`).innerHTML=badge;
      document.getElementById(`vlist-${p.id}`).innerHTML=lines.length?lines.join("  ·  "):"";
    });
  });
}

function resetVotes(){
  if(!confirm("Är du säker på att du vill nollställa ALLA röster? Detta går inte att ångra.")) return;
  db.ref("votes").remove().then(()=>alert("Alla röster är nollställda ✓")).catch(()=>alert("Något gick fel."));
}

// ─── CONFETTI ─────────────────────────────────────────────────
const COLORS=["#F0D060","#FFF5C0","#C9A84C","#E8A0B0","#6EE7B7","#fff","#FFD700"];
function burst(cx,cy,n){
  for(let i=0;i<n;i++){
    const el=document.createElement("div"); el.className="confetti-piece";
    const angle=(Math.random()*360)*(Math.PI/180), dist=100+Math.random()*220;
    el.style.setProperty("--tx",(Math.cos(angle)*dist)+"px");
    el.style.setProperty("--ty",(Math.sin(angle)*dist-100)+"px");
    el.style.setProperty("--r",(Math.random()*720-360)+"deg");
    el.style.left=cx+"px"; el.style.top=cy+"px";
    el.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
    el.style.width=(Math.random()*9+4)+"px"; el.style.height=(Math.random()*9+4)+"px";
    el.style.borderRadius=Math.random()>.5?"50%":"3px";
    el.style.animationDuration=(Math.random()*.5+.55)+"s";
    document.body.appendChild(el);
    el.addEventListener("animationend",()=>el.remove());
  }
}
function spawnConfetti(){ burst(window.innerWidth/2, window.innerHeight*.44, 55); }
function spawnFinale(){ for(let i=0;i<6;i++) setTimeout(()=>burst(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.5, 35), i*280); }

// ─── STARS ────────────────────────────────────────────────────
(function(){
  const c=document.getElementById("stars");
  const palette=[
    ["#FFFFFF","0 0 3px #FFFFFF"],
    ["#EEF4FF","0 0 4px #C8DAFF"],  // ice blue-white
    ["#D8EEFF","0 0 5px #A0C8FF"],  // cool blue
    ["#FFE8A0","0 0 5px #F0C840"],  // warm gold
    ["#F0D060","0 0 6px #E8B820"],  // gold
    ["#FFD8E0","0 0 4px #FFAABC"],  // rose blush
    ["#E8D0FF","0 0 5px #C890FF"],  // lavender
    ["#FFFDE0","0 0 3px #FFF0A0"],  // cream
  ];
  for(let i=0;i<120;i++){
    const s=document.createElement("div");
    const sz=Math.random()*2.6+0.4;
    const [col,glow]=palette[Math.floor(Math.random()*palette.length)];
    const big=sz>2.2&&Math.random()>.5;
    s.className="star"+(big?" big":"");
    s.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*76}vh;width:${sz}px;height:${sz}px;background:${col};box-shadow:${glow};animation-duration:${Math.random()*5+1.5}s;animation-delay:${Math.random()*9}s;`;
    c.appendChild(s);
  }
  // Shooting stars
  function shoot(){
    const el=document.createElement("div"); el.className="shooting-star";
    const len=Math.random()*90+35;
    const ang=-(Math.random()*22+8);
    const dx=Math.cos(ang*Math.PI/180)*180;
    const dy=Math.sin(ang*Math.PI/180)*180;
    el.style.setProperty("--sx",dx+"px");
    el.style.setProperty("--sy",dy+"px");
    el.style.cssText+=`top:${Math.random()*42}vh;left:${Math.random()*65+8}vw;width:${len}px;transform:rotate(${ang}deg);animation-duration:${Math.random()*.35+.3}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 900);
    setTimeout(shoot, Math.random()*9000+4000);
  }
  setTimeout(shoot, 2500);
})();

// ─── SPARKLES (fairy dust) ────────────────────────────────────
(function(){
  const c=document.getElementById("sparkles");
  const cols=[
    "#FFF8D0","#F0D060","#FFFDE0","#FFD8E0","#E8D0FF","#C8EAFF","#fff","#FFE090"
  ];
  const shapes=["50%","30% 70% 70% 30% / 30% 30% 70% 70%","50%","2px","50%"];
  for(let i=0;i<70;i++){
    const el=document.createElement("div"); el.className="sparkle";
    const sz=(Math.random()*3.5+1)+"px";
    el.style.cssText=`
      left:${Math.random()*100}vw;
      top:${60+Math.random()*38}vh;
      width:${sz}; height:${sz};
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
      box-shadow:0 0 ${Math.random()*5+2}px ${cols[Math.floor(Math.random()*cols.length)]};
      animation-duration:${Math.random()*7+4}s;
      animation-delay:${Math.random()*12}s;
    `;
    c.appendChild(el);
  }
})();
